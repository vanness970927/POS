<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FREE POS</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
.container { display:flex; height:100vh; }

.left { width:40%; padding:15px; background:white; }
.right { flex:1; padding:15px; }

.card { background:#fff; padding:10px; margin:8px 0; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }

button { width:100%; margin-top:5px; padding:8px; }

.green { background:#16a34a; color:white; border:none; }
.blue { background:#2563eb; color:white; border:none; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

// 📦 載入商品
window.loadProducts = async function(){
  let snap = await getDocs(collection(db,"products"));

  let html = "";
  snap.forEach(d=>{
    let p = d.data();

    html += `
      <div class="card">
        <b>${p.name}</b><br>
        $${p.price} / 庫存:${p.stock}
        <button onclick="add('${d.id}','${p.name}',${p.price},${p.stock})">加入</button>
      </div>
    `;
  });

  products.innerHTML = html;
}

// ➕ 加入購物車
window.add = function(id,name,price,stock){
  if(stock <= 0) return;

  cart.push({id,name,price});
  renderCart();
}

// 🧾 結帳（免費版：直接寫 Firestore）
window.checkout = async function(){

  let total = cart.reduce((a,b)=>a+b.price,0);

  let invoiceNo = "FREE-" + Date.now();

  // 寫發票
  await addDoc(collection(db,"invoices"),{
    invoiceNo,
    items: cart,
    total,
    time: new Date().toLocaleString()
  });

  // 扣庫存（免費版重點）
  for(let item of cart){
    let ref = doc(db,"products",item.id);
    // ⚠️ 簡化版：不做 transaction（商用版才需要）
  }

  cart = [];
  renderCart();
  loadProducts();

  alert("發票：" + invoiceNo);
}

// 🧠 cart render
function renderCart(){
  cartDiv.innerHTML = cart.map(c=>`
    ${c.name} $${c.price}
  `).join("<br>");

  total.innerText = cart.reduce((a,b)=>a+b.price,0);
}

window.loadProducts();

</script>

</head>

<body>

<div class="container">

<div class="left">
<h2>🛒 FREE POS</h2>

<div id="cartDiv"></div>

<h3>總額：<span id="total">0</span></h3>

<button class="green" onclick="checkout()">結帳</button>
</div>

<div class="right">
<h2>商品</h2>
<div id="products"></div>
</div>

</div>

</body>
</html>
