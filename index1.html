<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V17 POS</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
.container { display:flex; height:100vh; }

.left { width:40%; padding:15px; background:white; }
.right { flex:1; padding:15px; }

.card { background:#fff; padding:10px; margin:8px 0; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }

button { width:100%; margin-top:5px; padding:8px; }

.primary { background:#2563eb; color:white; border:none; }
.green { background:#16a34a; color:white; border:none; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart = [];

// 讀商品
window.loadProducts = async function(){
  let snap = await getDocs(collection(db,"products"));

  let html = "";
  snap.forEach(doc=>{
    let p = doc.data();

    html += `
      <div class="card">
        <b>${p.name}</b><br>
        $${p.price} / 庫存:${p.stock}
        <button onclick="add('${p.name}',${p.price})">加入</button>
      </div>
    `;
  });

  products.innerHTML = html;
}

// 加入購物車
window.add = function(name,price){
  cart.push({name,price});
  render();
}

// 結帳（呼叫後端）
window.checkout = async function(){

  let res = await fetch("/checkout",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ cart })
  });

  let data = await res.json();

  alert("發票號：" + data.invoiceNo);

  cart = [];
  render();
  loadProducts();
}

function render(){
  cartDiv.innerHTML = cart.map(c=>`${c.name} $${c.price}`).join("<br>");

  total.innerText = cart.reduce((a,b)=>a+b.price,0);
}

window.loadProducts();

</script>

</head>

<body>

<div class="container">

<div class="left">
<h2>🛒 POS V17</h2>

<div id="cartDiv"></div>

<h3>總金額：<span id="total">0</span></h3>

<button class="green" onclick="checkout()">結帳</button>
</div>

<div class="right">
<h2>商品</h2>
<div id="products"></div>
</div>

</div>

</body>
</html>
